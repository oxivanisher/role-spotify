---
- name: Check if flatpak is available
  ansible.builtin.stat:
    path: /usr/bin/flatpak
  register: spotify_flatpak_executable

- name: Check if snap is available
  ansible.builtin.stat:
    path: /usr/bin/snap
  register: spotify_snap_executable

- name: Enable the flathub remote in the system installation
  community.general.flatpak_remote:
    name: flathub
    state: present
    enabled: true
    flatpakrepo_url: https://dl.flathub.org/repo/flathub.flatpakrepo
  when: spotify_flatpak_executable.stat.exists
  become: true

- name: Install spotify as flatpak
  community.general.flatpak:
    name: com.spotify.Client
    state: present
    remote: flathub
  when: spotify_flatpak_executable.stat.exists
  become: true

- name: Install spotify as snap
  community.general.snap:
    name: spotify
    state: present
    classic: true
  when:
    - not spotify_flatpak_executable.stat.exists
    - spotify_snap_executable.stat.exists
  ignore_errors: "{{ ansible_check_mode }}"
  become: true
